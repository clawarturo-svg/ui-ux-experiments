<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planetono-style Fun Landing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Archivo+Black&display=swap" rel="stylesheet">
  <style>
    :root{
      --yellow:#f7c33a;
      --black:#111;
      --purple:#7a2ee6;
      --purple-dark:#5822b1;
      --red:#ff4e37;
      --cream:#fff6db;
      --white:#fff;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--yellow);font-family:Inter,system-ui,sans-serif;color:var(--black)}
    body{min-height:100vh}
    .page{max-width:1400px;margin:0 auto;min-height:100vh;padding:18px 28px 24px;position:relative;overflow:hidden}
    .nav{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px}
    .nav .left,.nav .right{display:flex;gap:34px;align-items:center}
    .nav .right{justify-content:flex-end}
    .nav a,.nav button{font-weight:800;color:var(--black);text-decoration:none;background:none;border:none;font-size:18px;cursor:pointer}
    .logo{font-family:'Archivo Black',sans-serif;font-size:54px;letter-spacing:-.04em;text-transform:uppercase;-webkit-text-stroke:2px var(--black);color:#fff;text-shadow:4px 4px 0 var(--black);line-height:.9;text-align:center}
    .logo small{display:block;font-size:20px;-webkit-text-stroke:1px var(--black);margin-top:4px}
    .hero{display:grid;grid-template-columns:1.05fr 1.1fr .95fr;gap:18px;align-items:center;padding-top:18px}
    .burst{background:#fff;border:4px solid var(--black);padding:30px 26px;clip-path:polygon(7% 0%, 20% 9%, 32% 0%, 47% 10%, 65% 0%, 79% 12%, 100% 7%, 90% 26%, 100% 41%, 89% 56%, 100% 74%, 84% 84%, 92% 100%, 69% 92%, 56% 100%, 42% 90%, 28% 100%, 16% 87%, 0% 94%, 11% 72%, 0% 55%, 12% 39%, 0% 23%, 16% 12%);box-shadow:8px 8px 0 var(--black);max-width:420px;justify-self:center}
    .burst .jp{font-size:20px;font-weight:900;color:#ea3b2d;letter-spacing:.02em}
    .burst .main{font-family:'Archivo Black',sans-serif;font-size:62px;line-height:.94;color:#f04a31;text-transform:uppercase;letter-spacing:-.05em;margin-top:8px}
    .center-visual{position:relative;min-height:620px;display:grid;place-items:center}
    .planet{position:absolute;width:420px;height:540px;background:radial-gradient(circle at 30% 30%, #8f3eff 0%, var(--purple) 50%, var(--purple-dark) 100%);border:4px solid var(--black);border-radius:50%;transform:rotate(-8deg);box-shadow:10px 10px 0 rgba(0,0,0,.18)}
    .tray{position:relative;width:420px;height:270px;background:linear-gradient(180deg,#8f47ff,#6d25d7);border:4px solid var(--black);border-radius:34px;transform:rotate(-14deg);box-shadow:10px 12px 0 rgba(0,0,0,.14);z-index:2}
    .tray:before,.tray:after{content:"";position:absolute;border:4px solid rgba(255,255,255,.18);border-radius:24px}
    .tray:before{inset:26px 140px 96px 22px}
    .tray:after{inset:138px 26px 24px 24px}
    .sauce{position:absolute;right:52px;bottom:88px;width:180px;height:72px;background:#ffc52b;border:4px solid var(--black);border-radius:999px;transform:rotate(18deg);z-index:4;box-shadow:0 8px 0 rgba(0,0,0,.12)}
    .sauce:before{content:"";position:absolute;inset:18px 18px 18px 18px;background:linear-gradient(90deg,transparent 0 6%, #ff5338 6% 12%, transparent 12% 18%, #ff5338 18% 24%, transparent 24% 30%, #ff5338 30% 36%, transparent 36% 42%, #ff5338 42% 48%, transparent 48% 54%, #ff5338 54% 60%, transparent 60%);border-radius:999px;opacity:.95}
    .fries{position:absolute;right:78px;top:86px;width:92px;height:112px;background:#ff432f;border:4px solid var(--black);border-radius:10px 10px 18px 18px;z-index:5}
    .fries:before{content:"";position:absolute;left:8px;right:8px;top:-38px;height:54px;background:repeating-linear-gradient(90deg,#ffd23f 0 12px,#ffbe00 12px 18px);clip-path:polygon(0 100%,5% 0,18% 100%,25% 6%,38% 100%,47% 0,60% 100%,72% 10%,84% 100%,95% 0,100% 100%);border:4px solid var(--black);border-bottom:none;border-radius:8px 8px 0 0}
    .icecream{position:absolute;left:216px;top:106px;width:76px;height:132px;z-index:5}
    .icecream .cone{position:absolute;left:12px;bottom:0;width:52px;height:70px;background:#ffd37b;border:4px solid var(--black);clip-path:polygon(50% 100%,0 0,100% 0)}
    .icecream .scoop{position:absolute;top:0;left:0;width:76px;height:76px;background:#fff7f0;border:4px solid var(--black);border-radius:50% 50% 44% 44%;box-shadow:inset -12px -10px 0 #ffd8c8}
    .mascot{position:absolute;left:106px;top:102px;width:72px;height:92px;z-index:6}
    .mascot .head{width:72px;height:60px;background:#ffd24d;border:4px solid var(--black);border-radius:50%;position:relative}
    .mascot .head:before,.mascot .head:after{content:"";position:absolute;top:-10px;width:18px;height:18px;background:#ffd24d;border:4px solid var(--black);border-radius:50%}
    .mascot .head:before{left:6px}.mascot .head:after{right:6px}
    .mascot .body{width:52px;height:38px;margin: -4px auto 0;background:#f8efe1;border:4px solid var(--black);border-radius:22px}
    .sparkle{position:absolute;font-size:42px;font-weight:900;filter:drop-shadow(3px 3px 0 var(--black));}
    .s1{left:10%;top:58%}.s2{left:43%;top:8%}.s3{right:5%;top:46%}
    .content{padding:10px 10px 10px 30px}
    .content h1{font-family:'Archivo Black',sans-serif;font-size:clamp(54px,6vw,92px);line-height:.93;letter-spacing:-.07em;margin:0 0 20px;text-transform:uppercase}
    .content .desc-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;max-width:540px}
    .content p{font-size:22px;line-height:1.35;margin:0;font-weight:700}
    .controls{display:flex;align-items:center;gap:18px;margin-top:42px}
    .arrow{width:58px;height:58px;border:4px solid var(--black);border-radius:18px;background:var(--white);display:grid;place-items:center;font-size:28px;font-weight:900;box-shadow:4px 4px 0 var(--black)}
    .pager{display:flex;align-items:center;gap:12px}
    .pager .dot{width:11px;height:11px;background:var(--black);border-radius:50%}
    .pager .line{width:82px;height:8px;border-radius:999px;background:var(--white);border:3px solid var(--black)}
    .chevron{display:grid;place-items:center;font-size:44px;font-weight:900;margin-top:18px}
    @media (max-width: 1200px){
      .hero{grid-template-columns:1fr;gap:30px}
      .burst,.content{justify-self:center;text-align:center}
      .content .desc-grid{margin:0 auto}
      .controls{justify-content:center}
      .nav{grid-template-columns:1fr;justify-items:center}
      .nav .left,.nav .right{justify-content:center;flex-wrap:wrap}
    }
    @media (max-width: 680px){
      .page{padding:14px}
      .logo{font-size:42px}
      .nav .left,.nav .right{gap:16px}
      .nav a,.nav button{font-size:15px}
      .burst{max-width:none;padding:24px 20px}
      .burst .main{font-size:44px}
      .center-visual{min-height:420px}
      .planet{width:280px;height:360px}
      .tray{width:290px;height:185px}
      .sauce{width:125px;height:54px;right:36px;bottom:58px}
      .fries{right:54px;top:62px;width:68px;height:86px}
      .icecream{left:150px;top:74px;transform:scale(.82)}
      .mascot{left:70px;top:74px;transform:scale(.82)}
      .content h1{font-size:54px}
      .content p{font-size:18px}
      .content .desc-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <main class="page">
    <nav class="nav">
      <div class="left">
        <a href="#works">How it works</a>
        <a href="#locations">Locations</a>
      </div>
      <div class="logo">PLANETOÑO<small>惑星ちゃん</small></div>
      <div class="right">
        <a href="#contact">Contact</a>
        <button>Sound on 🔊</button>
      </div>
    </nav>

    <section class="hero">
      <aside class="burst">
        <div class="jp">ハイパーホットドッグミール</div>
        <div class="main">Hyperdog<br/>Meal</div>
      </aside>

      <div class="center-visual" aria-hidden="true">
        <div class="planet"></div>
        <div class="tray"></div>
        <div class="mascot"><div class="head"></div><div class="body"></div></div>
        <div class="icecream"><div class="scoop"></div><div class="cone"></div></div>
        <div class="fries"></div>
        <div class="sauce"></div>
        <div class="sparkle s1">✦</div>
        <div class="sparkle s2">✦</div>
        <div class="sparkle s3">✦</div>
      </div>

      <article class="content">
        <h1>Celestial<br/>fuel for<br/>interstellar<br/>appetites</h1>
        <div class="desc-grid">
          <p>A warp-speed hot dog with solar ketchup and nebula mustard.</p>
          <p>Includes Cluck Rogers, the space chick on a flavor mission.</p>
        </div>
        <div class="controls">
          <div class="arrow">←</div>
          <div class="pager"><div class="dot"></div><div class="line"></div><div class="dot"></div></div>
          <div class="arrow">→</div>
        </div>
      </article>
    </section>

    <div class="chevron">⌄</div>
  </main>
</body>
</html>
